<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Admin — Loot Box Creator</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0e1a;
      --bg-card:  rgba(26, 31, 53, 0.7);
      --border:   rgba(65, 105, 225, 0.2);
      --brand:    #3b82f6;
      --text:     #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim: #475569;
      --success:  #10b981;
      --danger:   #ef4444;
      --radius:   12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 860px; margin: 0 auto; }

    /* Header */
    .header { margin-bottom: 2rem; }
    .header h1 {
      font-size: 1.75rem; font-weight: 800; color: var(--text);
      background: linear-gradient(135deg, #3b82f6, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.35rem;
    }
    .header p { color: var(--text-muted); font-size: 0.9rem; }
    .header-nav { margin-top: 0.75rem; }
    .header-nav a {
      color: var(--brand); font-size: 0.85rem; text-decoration: none;
      opacity: 0.7; transition: opacity 0.2s;
    }
    .header-nav a:hover { opacity: 1; }

    /* Stats bar */
    .stats { display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .stat {
      padding: 0.75rem 1.25rem; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius);
      display: flex; align-items: center; gap: 0.75rem;
      backdrop-filter: blur(12px);
    }
    .stat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); }
    .stat-count { font-size: 1.25rem; font-weight: 700; color: var(--text); }

    /* Card */
    .card {
      background: var(--bg-card); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 16px;
      padding: 2rem; margin-bottom: 2rem;
    }
    .card h2 { font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 1.5rem; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .form-full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label {
      font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 0.7rem 0.9rem; font-size: 0.95rem; font-family: inherit;
      color: var(--text); background: rgba(15, 22, 36, 0.8);
      border: 2px solid var(--border); border-radius: 8px;
      outline: none; transition: all 0.2s ease; resize: vertical;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 16px rgba(59, 130, 246, 0.15);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--text-dim); }
    .form-group select option { background: #1a1f35; }

    /* Chest picker */
    .chest-picker {
      display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.5rem;
    }
    .chest-option {
      width: 70px; cursor: pointer; border-radius: 10px; padding: 6px;
      border: 2px solid transparent; background: rgba(15, 22, 36, 0.6);
      transition: all 0.2s ease; text-align: center;
    }
    .chest-option:hover { border-color: rgba(59, 130, 246, 0.4); }
    .chest-option.selected { border-color: var(--brand); background: rgba(59, 130, 246, 0.15); }
    .chest-option img { width: 48px; height: 48px; object-fit: contain; display: block; margin: 0 auto 4px; }
    .chest-option span { font-size: 0.65rem; color: var(--text-muted); display: block; }

    /* Items builder */
    .items-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .item-row {
      display: grid; grid-template-columns: 1fr 80px 40px auto;
      gap: 0.5rem; align-items: center;
    }
    .item-row input {
      padding: 0.55rem 0.75rem; font-size: 0.875rem; font-family: inherit;
      color: var(--text); background: rgba(15, 22, 36, 0.8);
      border: 1px solid var(--border); border-radius: 7px;
      outline: none; transition: border-color 0.2s;
    }
    .item-row input:focus { border-color: var(--brand); }
    .item-row input[type="number"] { text-align: center; }
    .item-row input[type="color"] {
      padding: 2px; height: 36px; cursor: pointer; border-radius: 7px;
    }
    .btn-remove-item {
      background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 7px; color: var(--danger); cursor: pointer;
      font-size: 1rem; width: 32px; height: 36px; display: flex;
      align-items: center; justify-content: center; transition: all 0.2s;
    }
    .btn-remove-item:hover { background: rgba(239, 68, 68, 0.3); }

    .odds-total {
      font-size: 0.8rem; font-weight: 600; margin-bottom: 0.75rem;
      padding: 0.4rem 0.75rem; border-radius: 7px; display: inline-block;
    }
    .odds-ok { color: var(--success); background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); }
    .odds-warn { color: #f59e0b; background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2); }

    /* Buttons */
    .btn {
      padding: 0.7rem 1.5rem; font-size: 0.9rem; font-weight: 700;
      font-family: inherit; border: none; border-radius: 10px;
      cursor: pointer; transition: all 0.2s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      color: #fff; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4); }
    .btn-secondary {
      background: rgba(100, 116, 139, 0.2); color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: rgba(100, 116, 139, 0.3); }
    .btn-danger {
      background: rgba(239, 68, 68, 0.15); color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.3); }
    .btn-add-item {
      background: rgba(16, 185, 129, 0.1); color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
      padding: 0.55rem 1rem; font-size: 0.85rem;
    }
    .btn-add-item:hover { background: rgba(16, 185, 129, 0.2); }

    .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; flex-wrap: wrap; }

    /* Template list */
    .template-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .template-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 1rem;
      backdrop-filter: blur(8px); transition: border-color 0.2s;
    }
    .template-card:hover { border-color: rgba(59, 130, 246, 0.35); }
    .template-card-img {
      width: 48px; height: 48px; object-fit: contain;
      border-radius: 8px; flex-shrink: 0;
      background: rgba(30, 64, 175, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.2); padding: 4px;
    }
    .template-card-info { flex: 1; min-width: 0; }
    .template-card-name { font-weight: 700; font-size: 0.95rem; color: var(--text); }
    .template-card-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
    .template-card-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 0.65rem; font-weight: 700; margin-left: 6px;
    }
    .badge-curated { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
    .badge-category { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }

    /* Toast */
    #toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(65, 105, 225, 0.3);
      border-radius: 10px; padding: 0.75rem 1.5rem; color: var(--text);
      font-size: 0.9rem; font-weight: 500; z-index: 999;
      transition: transform 0.3s ease; pointer-events: none;
      backdrop-filter: blur(12px); box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(16, 185, 129, 0.4); color: var(--success); }
    #toast.error { border-color: rgba(239, 68, 68, 0.4); color: var(--danger); }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-full { grid-column: 1; }
      .item-row { grid-template-columns: 1fr 70px 36px auto; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Template Admin</h1>
    <p>Create and manage curated templates for the Discover screen.</p>
    <div class="header-nav">
      <a href="box-admin.html">← Box Catalog Admin</a>
    </div>
  </div>

  <div class="stats" id="statsBar"></div>

  <!-- Create / Edit Form -->
  <div class="card" id="formCard">
    <h2 id="formTitle">Create New Template</h2>

    <div class="form-grid">

      <!-- Template Name -->
      <div class="form-group">
        <label>Template Name</label>
        <input type="text" id="templateName" placeholder="e.g., Bedtime Box" />
      </div>

      <!-- Category -->
      <div class="form-group">
        <label>Category</label>
        <select id="templateCategory">
          <option value="Family">Family</option>
          <option value="Kids">Kids</option>
          <option value="Party">Party</option>
          <option value="Decisions">Decisions</option>
          <option value="Food">Food</option>
          <option value="Activities">Activities</option>
          <option value="Holidays">Holidays</option>
          <option value="General">General</option>
        </select>
      </div>

      <!-- Description -->
      <div class="form-group form-full">
        <label>Description</label>
        <textarea id="templateDescription" rows="2" placeholder="Short description shown on the Discover card, e.g., Perfect for settling the bedtime routine debate"></textarea>
      </div>

      <!-- Chest Image Picker -->
      <div class="form-group form-full">
        <label>Chest Image</label>
        <div class="chest-picker" id="chestPicker"></div>
      </div>

    </div>

    <!-- Items Builder -->
    <div style="margin-top: 1.5rem;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem;">
        <label style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">
          Items
        </label>
        <div id="oddsTotal" class="odds-total odds-warn">Total: 0%</div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 80px 40px auto; gap: 0.5rem; margin-bottom: 0.35rem; padding: 0 2px;">
        <span style="font-size: 0.7rem; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;">Item Name</span>
        <span style="font-size: 0.7rem; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; text-align: center;">Odds %</span>
        <span style="font-size: 0.7rem; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; text-align: center;">Color</span>
        <span></span>
      </div>

      <div class="items-list" id="itemsList"></div>

      <button class="btn btn-add-item" onclick="addItem()">+ Add Item</button>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveTemplate()">Publish Template</button>
      <button class="btn btn-secondary" onclick="resetForm()">Clear Form</button>
    </div>
  </div>

  <!-- Template List -->
  <div class="card">
    <h2>Published Templates</h2>
    <div id="templateList">
      <div style="color: var(--text-muted); font-size: 0.9rem;">Loading...</div>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ── Firebase Config ──────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyBXJTbpOBdUdR9m8FGEgjNa-xqPH7-EWMQ",
    authDomain: "lootbox-app-dd5fa.firebaseapp.com",
    projectId: "lootbox-app-dd5fa",
    storageBucket: "lootbox-app-dd5fa.firebasestorage.app",
    messagingSenderId: "16386037455",
    appId: "1:16386037455:web:df2ef3eb25929357dfc9ba",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── Constants ────────────────────────────────────────────────────
  const CHEST_OPTIONS = [
    { id: 'chest',      name: 'Classic',    file: './assets/images/boxes/free/chest.png' },
    { id: 'skull_bone', name: 'Skull',      file: './assets/images/boxes/free/skull_bone.png' },
    { id: 'metal',      name: 'Metal',      file: './assets/images/boxes/free/metal.png' },
  ];

  const DEFAULT_COLORS = [
    '#3b82f6','#10b981','#f59e0b','#ef4444',
    '#8b5cf6','#ec4899','#06b6d4','#f97316',
  ];

  // ── State ────────────────────────────────────────────────────────
  let items = [];
  let selectedChestId = 'chest';
  let editingTemplateId = null;
  let colorIndex = 0;

  // ── Init ─────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    renderChestPicker();
    addItem(); // start with one empty item row
    loadTemplates();
  });

  // ── Chest Picker ─────────────────────────────────────────────────
  function renderChestPicker() {
    const el = document.getElementById('chestPicker');
    el.innerHTML = CHEST_OPTIONS.map(c => `
      <div class="chest-option ${c.id === selectedChestId ? 'selected' : ''}"
           onclick="selectChest('${c.id}')" id="chest-${c.id}">
        <img src="${c.file}" alt="${c.name}" onerror="this.style.opacity=0.3" />
        <span>${c.name}</span>
      </div>
    `).join('');
  }

  function selectChest(id) {
    selectedChestId = id;
    document.querySelectorAll('.chest-option').forEach(el => el.classList.remove('selected'));
    document.getElementById('chest-' + id)?.classList.add('selected');
  }

  // ── Items Builder ────────────────────────────────────────────────
  function addItem(name = '', percentage = '', color = '') {
    const id = Date.now() + Math.random();
    const assignedColor = color || DEFAULT_COLORS[colorIndex % DEFAULT_COLORS.length];
    colorIndex++;
    items.push({ id, name, percentage, color: assignedColor });
    renderItems();
  }

  function removeItem(id) {
    items = items.filter(i => i.id !== id);
    renderItems();
  }

  function renderItems() {
    const list = document.getElementById('itemsList');
    if (items.length === 0) {
      list.innerHTML = '<div style="color: var(--text-dim); font-size: 0.85rem; padding: 0.5rem 0;">No items yet. Add at least one.</div>';
      updateOddsTotal();
      return;
    }
    list.innerHTML = items.map((item, i) => `
      <div class="item-row">
        <input type="text" placeholder="Item name" value="${escHtml(item.name)}"
          oninput="updateItem(${item.id}, 'name', this.value)" />
        <input type="number" placeholder="%" min="0.01" max="100" step="0.01"
          value="${item.percentage}"
          oninput="updateItem(${item.id}, 'percentage', this.value)" />
        <input type="color" value="${item.color}"
          oninput="updateItem(${item.id}, 'color', this.value)" />
        <button class="btn-remove-item" onclick="removeItem(${item.id})" title="Remove">×</button>
      </div>
    `).join('');
    updateOddsTotal();
  }

  function updateItem(id, field, value) {
    const item = items.find(i => i.id === id);
    if (item) {
      item[field] = field === 'percentage' ? value : value;
      if (field === 'percentage') updateOddsTotal();
    }
  }

  function updateOddsTotal() {
    const total = items.reduce((sum, i) => sum + (parseFloat(i.percentage) || 0), 0);
    const el = document.getElementById('oddsTotal');
    const rounded = Math.round(total * 100) / 100;
    el.textContent = `Total: ${rounded}%`;
    el.className = 'odds-total ' + (Math.abs(rounded - 100) < 0.1 ? 'odds-ok' : 'odds-warn');
  }

  // ── Save Template ────────────────────────────────────────────────
  async function saveTemplate() {
    const name = document.getElementById('templateName').value.trim();
    const description = document.getElementById('templateDescription').value.trim();
    const category = document.getElementById('templateCategory').value;

    if (!name) { showToast('Please enter a template name', 'error'); return; }
    if (items.length === 0) { showToast('Add at least one item', 'error'); return; }

    const validItems = items.filter(i => i.name.trim() && parseFloat(i.percentage) > 0);
    if (validItems.length === 0) { showToast('Items need names and valid odds', 'error'); return; }

    const total = validItems.reduce((s, i) => s + parseFloat(i.percentage), 0);
    if (Math.abs(total - 100) > 0.5) {
      showToast(`Odds total ${Math.round(total * 10) / 10}% — should be 100%`, 'error');
      return;
    }

    const templateData = {
      name,
      description,
      category,
      boxImageId: selectedChestId,
      curated: true,
      createdAt: Date.now(),
      createdBy: 'Admin',
      shareCode: editingTemplateId || generateCode(),
      templateId: editingTemplateId || generateCode(),
      hideContents: false,
      hideOdds: false,
      maxPulls: null,
      expiresAt: null,
      items: validItems.map(i => ({
        id: String(i.id),
        name: i.name.trim(),
        percentage: parseFloat(i.percentage),
        color: i.color,
        maxQuantity: null,
        imageUrl: null,
      })),
    };

    try {
      const docId = editingTemplateId || templateData.shareCode;
      await db.collection('boxTemplates').doc(docId).set(templateData);
      showToast(editingTemplateId ? 'Template updated!' : 'Template published!', 'success');
      resetForm();
      loadTemplates();
    } catch (err) {
      console.error(err);
      showToast('Failed to save: ' + err.message, 'error');
    }
  }

  // ── Edit Template ────────────────────────────────────────────────
  function editTemplate(id) {
    db.collection('boxTemplates').doc(id).get().then(doc => {
      if (!doc.exists) return;
      const t = doc.data();
      editingTemplateId = id;

      document.getElementById('templateName').value = t.name || '';
      document.getElementById('templateDescription').value = t.description || '';
      document.getElementById('templateCategory').value = t.category || 'General';
      document.getElementById('formTitle').textContent = 'Edit Template';

      selectedChestId = t.boxImageId || 'chest';
      renderChestPicker();

      items = (t.items || []).map(i => ({ ...i, id: Date.now() + Math.random() }));
      colorIndex = items.length;
      renderItems();

      document.getElementById('formCard').scrollIntoView({ behavior: 'smooth' });
    });
  }

  // ── Delete Template ───────────────────────────────────────────────
  async function deleteTemplate(id, name) {
    if (!confirm(`Delete "${name}"? This will remove it from the Discover screen immediately.`)) return;
    try {
      await db.collection('boxTemplates').doc(id).delete();
      showToast('Template deleted', 'success');
      loadTemplates();
    } catch (err) {
      showToast('Delete failed: ' + err.message, 'error');
    }
  }

  // ── Toggle Curated ────────────────────────────────────────────────
  async function toggleCurated(id, current) {
    try {
      await db.collection('boxTemplates').doc(id).update({ curated: !current });
      showToast(!current ? 'Now visible in Discover' : 'Hidden from Discover', 'success');
      loadTemplates();
    } catch (err) {
      showToast('Update failed: ' + err.message, 'error');
    }
  }

  // ── Load Templates ────────────────────────────────────────────────
  async function loadTemplates() {
    const listEl = document.getElementById('templateList');
    const statsEl = document.getElementById('statsBar');
    try {
      const snap = await db.collection('boxTemplates').get();
      const all = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      const curated = all.filter(t => t.curated);
      const total = all.length;

      statsEl.innerHTML = `
        <div class="stat">
          <div class="stat-dot" style="background: #3b82f6;"></div>
          <div><div class="stat-label">Total Templates</div><div class="stat-count">${total}</div></div>
        </div>
        <div class="stat">
          <div class="stat-dot" style="background: #10b981;"></div>
          <div><div class="stat-label">Live in Discover</div><div class="stat-count">${curated.length}</div></div>
        </div>
      `;

      if (all.length === 0) {
        listEl.innerHTML = '<div style="color: var(--text-muted); font-size: 0.9rem;">No templates yet. Create your first one above!</div>';
        return;
      }

      listEl.innerHTML = all.map(t => {
        const chestFile = CHEST_OPTIONS.find(c => c.id === t.boxImageId)?.file
          || './assets/images/boxes/free/chest.png';
        const itemCount = (t.items || []).length;
        const catLabel = t.category && t.category !== 'General'
          ? `<span class="badge badge-category">${t.category}</span>` : '';
        const curatedBadge = t.curated
          ? `<span class="badge badge-curated">Live</span>` : '';

        return `
          <div class="template-card">
            <img class="template-card-img" src="${chestFile}" alt="${t.name}"
              onerror="this.style.opacity=0.3" />
            <div class="template-card-info">
              <div class="template-card-name">
                ${escHtml(t.name)}${curatedBadge}${catLabel}
              </div>
              <div class="template-card-meta">
                ${itemCount} item${itemCount !== 1 ? 's' : ''}
                ${t.description ? ' · ' + escHtml(t.description.substring(0, 60)) + (t.description.length > 60 ? '…' : '') : ''}
              </div>
            </div>
            <div class="template-card-actions">
              <button class="btn btn-secondary" style="padding: 0.45rem 0.75rem; font-size: 0.8rem;"
                onclick="toggleCurated('${t.id}', ${!!t.curated})">
                ${t.curated ? 'Unpublish' : 'Publish'}
              </button>
              <button class="btn btn-secondary" style="padding: 0.45rem 0.75rem; font-size: 0.8rem;"
                onclick="editTemplate('${t.id}')">Edit</button>
              <button class="btn btn-danger" style="padding: 0.45rem 0.75rem; font-size: 0.8rem;"
                onclick="deleteTemplate('${t.id}', '${escHtml(t.name)}')">Delete</button>
            </div>
          </div>
        `;
      }).join('');

    } catch (err) {
      listEl.innerHTML = `<div style="color: var(--danger);">Failed to load: ${err.message}</div>`;
    }
  }

  // ── Reset Form ────────────────────────────────────────────────────
  function resetForm() {
    editingTemplateId = null;
    document.getElementById('templateName').value = '';
    document.getElementById('templateDescription').value = '';
    document.getElementById('templateCategory').value = 'Family';
    document.getElementById('formTitle').textContent = 'Create New Template';
    selectedChestId = 'chest';
    items = [];
    colorIndex = 0;
    renderChestPicker();
    addItem();
  }

  // ── Helpers ───────────────────────────────────────────────────────
  function generateCode() {
    return Math.random().toString(36).substring(2, 10).toUpperCase();
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  let toastTimer;
  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }
</script>
</body>
</html>
